name: Build & Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx next build
      - name: Verify production build
        run: ls -la .next/BUILD_ID && echo "Build OK"

  deploy:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploy to https://sofan-ai.space-z.ai/ ready for platform integration"
